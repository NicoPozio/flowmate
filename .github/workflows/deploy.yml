name: Deploy to DigitalOcean Droplet

# Si attiva ad ogni push sul branch principale
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Esecuzione deploy remoto via SSH
        uses: appleboy/ssh-action@master
        env:
          # DICHIARAZIONE: Passiamo i segreti dall'interfaccia GitHub all'ambiente della Action
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ESPORTAZIONE: Rendiamo le variabili disponibili nello script Bash sotto
          envs: DB_USER, DB_PASSWORD, DB_ROOT_PASSWORD
          script: |
            # 1. Navigazione nella directory del progetto
            cd /root/flowmate
            
            # 2. Aggiornamento del codice sorgente
            git checkout main
            git pull origin main
            
            # 3. Iniezione variabili per il Backend
            mkdir -p backend
            echo "DB_HOST=flowmate-db" > backend/.env
            echo "DB_PORT=3306" >> backend/.env
            echo "DB_NAME=flowmate_db" >> backend/.env
            echo "DB_USER=$DB_USER" >> backend/.env
            echo "DB_PASSWORD=$DB_PASSWORD" >> backend/.env
            
            # 4. Iniezione variabili per MariaDB (Parametri nativi MARIADB_*)
            mkdir -p mariadb
            echo "MARIADB_ROOT_PASSWORD=$DB_ROOT_PASSWORD" > mariadb/.env
            echo "MARIADB_DATABASE=flowmate_db" >> mariadb/.env
            echo "MARIADB_USER=$DB_USER" >> mariadb/.env
            echo "MARIADB_PASSWORD=$DB_PASSWORD" >> mariadb/.env
            
            # 5. Orchestrazione Docker
            # down -v: Rimuove i container e i volumi esistenti per una pulizia profonda
            # up -d --build: Ricostruisce le immagini e avvia in background
            docker compose down -v
            docker compose up -d --build