services: 
  mariadb:
    build: ./mariadb
    container_name: flowmate-db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    env_file:
      - mariadb/.env

  backend:
    build: ./backend
    command: >
      uvicorn backend:app --host 0.0.0.0 --port 8003 --log-config log_config.yaml
    container_name: flowmate-backend
    ports: 
      - "8003:8003"
    env_file:
      - backend/.env
    environment:
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-adminsdk.json
    volumes:
      - ./backend/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    depends_on: 
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data: